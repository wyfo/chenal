name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - acquire_cas

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: [--no-default-features, --all-features]
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - name: rustfmt
        run: cargo fmt -- --check --config "unstable_features=true,imports_granularity=Crate,group_imports=StdExternalCrate,format_code_in_doc_comments=true"
      - name: clippy
        run: cargo clippy ${{ matrix.features }} --all-targets -- -D warnings
      - name: test
        run: cargo test ${{ matrix.features }}
      - name: check doc
        if: matrix.features == '--all-features'
        run: cargo doc ${{ matrix.features }}
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  benchmark:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        kind: [mpsc]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench
      - name: run benchmarks
        run: cd bench; cargo bench -- --quick '^${{ matrix.kind }}/'
      - name: export results
        run: cd bench; python3 report.py

