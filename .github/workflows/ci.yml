name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - acquire_cas

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        kind: [mpsc]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench
      - name: run benchmarks
        run: cd bench; cargo bench -- --quick '^${{ matrix.kind }}/'
      - name: export results
        run: cd bench; python3 report.py

